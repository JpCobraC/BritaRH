<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2f7f33",
                        "background-light": "#f6f8f6",
                        "background-dark": "#141e15",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%232f7f33' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
            padding-right: 2.5rem;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="layout-container flex h-full grow flex-col">
<!-- Top Navigation -->
<header class="flex items-center justify-between whitespace-nowrap border-b border-primary/10 bg-white dark:bg-background-dark px-6 md:px-40 py-4">
<div class="flex items-center gap-3">
<div class="text-primary">
<span class="material-symbols-outlined text-3xl">eco</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-xl font-bold leading-tight tracking-tight">BritaRH</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center rounded-lg h-10 w-10 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">person</span>
</button>
</div>
</header>
<main class="flex-1 flex justify-center py-8 px-4 md:px-0">
<div class="max-w-[800px] w-full flex flex-col gap-8">
<!-- Step Indicator -->
<div class="bg-white dark:bg-slate-800/50 p-6 rounded-lg border border-primary/10 shadow-sm">
<div class="flex items-center justify-between mb-6">
<div class="flex items-center gap-2 md:gap-4 flex-wrap">
<div class="flex items-center gap-2">
<span class="flex items-center justify-center w-8 h-8 rounded-full bg-primary text-white text-sm font-bold">1</span>
<span class="font-semibold text-primary">Perfil</span>
</div>
<span class="material-symbols-outlined text-primary/40">arrow_forward</span>
<div class="flex items-center gap-2 opacity-50">
<span class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-sm font-bold">2</span>
<span class="font-medium">Teste</span>
</div>
<span class="material-symbols-outlined text-primary/40">arrow_forward</span>
<div class="flex items-center gap-2 opacity-50">
<span class="flex items-center justify-center w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-400 text-sm font-bold">3</span>
<span class="font-medium">Currículo</span>
</div>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-end">
<p class="text-slate-600 dark:text-slate-400 text-sm font-medium">Progresso do cadastro</p>
<p class="text-primary text-sm font-bold">33% concluído</p>
</div>
<div class="h-2 w-full bg-primary/10 rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full" style="width: 33.33%;"></div>
</div>
</div>
</div>
<!-- Form Card -->
<div class="bg-white dark:bg-slate-800/50 rounded-lg border border-primary/10 shadow-sm p-6 md:p-8">
<h1 class="text-2xl font-bold mb-8 text-slate-900 dark:text-white">Informações do Candidato</h1>
<form class="space-y-6">
<!-- Two columns for smaller inputs -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">E-mail</label>
<input class="w-full rounded-lg border-primary/20 bg-background-light dark:bg-slate-900 dark:border-primary/30 focus:border-primary focus:ring-primary h-12 px-4" placeholder="seu@email.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Telefone</label>
<input class="w-full rounded-lg border-primary/20 bg-background-light dark:bg-slate-900 dark:border-primary/30 focus:border-primary focus:ring-primary h-12 px-4" placeholder="(00) 00000-0000" type="tel"/>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Tempo na área</label>
<select class="w-full rounded-lg border-primary/20 bg-background-light dark:bg-slate-900 dark:border-primary/30 focus:border-primary focus:ring-primary h-12 px-4 text-slate-700 dark:text-slate-300">
<option disabled="" selected="" value="">Selecione sua experiência</option>
<option value="junior">Menos de 1 ano</option>
<option value="1-3">1 a 3 anos</option>
<option value="3-5">3 a 5 anos</option>
<option value="senior">Mais de 5 anos</option>
</select>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Localização</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary/50">location_on</span>
<input class="w-full rounded-lg border-primary/20 bg-background-light dark:bg-slate-900 dark:border-primary/30 focus:border-primary focus:ring-primary h-12 pl-10 pr-4" placeholder="Cidade, Estado" type="text"/>
</div>
</div>
</div>
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Experiências anteriores</label>
<textarea class="w-full rounded-lg border-primary/20 bg-background-light dark:bg-slate-900 dark:border-primary/30 focus:border-primary focus:ring-primary p-4 resize-none" placeholder="Conte-nos brevemente sobre seus últimos cargos e responsabilidades..." rows="4"></textarea>
</div>
<div class="flex flex-col gap-4">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Disponibilidade de horários</label>
<div class="flex flex-wrap gap-4">
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-5 h-5 rounded border-primary/30 text-primary focus:ring-primary bg-background-light dark:bg-slate-900" type="checkbox"/>
<span class="text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Manhã</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-5 h-5 rounded border-primary/30 text-primary focus:ring-primary bg-background-light dark:bg-slate-900" type="checkbox"/>
<span class="text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Tarde</span>
</label>
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-5 h-5 rounded border-primary/30 text-primary focus:ring-primary bg-background-light dark:bg-slate-900" type="checkbox"/>
<span class="text-slate-700 dark:text-slate-300 group-hover:text-primary transition-colors">Noite</span>
</label>
</div>
</div>
<div class="pt-6 border-t border-primary/10 flex justify-end">
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3 px-8 rounded-lg flex items-center gap-2 transition-all shadow-md hover:shadow-lg" type="submit">
                                Avançar para o Teste
                                <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</form>
</div>
<!-- Assistance Footer inside main -->
<div class="flex justify-between items-center text-slate-500 dark:text-slate-400 text-sm px-4">
<p>© 2024 BritaRH. Todos os direitos reservados.</p>
<a class="hover:text-primary flex items-center gap-1" href="#">
<span class="material-symbols-outlined text-sm">help</span>
                        Precisa de ajuda?
                    </a>
</div>
</div>
</main>
</div>
</body></html>
