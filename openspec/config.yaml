schema: spec-driven

context: |
  Project: BritaRH — recruitment platform for Britasul (Brazilian industrial company)

  Tech Stack:
  - Backend: Python 3.12+, FastAPI, PostgreSQL (via SQLAlchemy async + Alembic migrations)
  - Frontend: TypeScript, Next.js 14+ (App Router)
  - Auth: NextAuth.js (Google OAuth) on frontend; JWT validation on backend
  - File Storage: local volume or S3-compatible (MinIO in dev, configure via env)
  - DevOps: Docker + Docker Compose, GitHub Actions for CI/CD

  Conventions:
  - Backend: REST API at /api/v1/, Pydantic v2 schemas, async endpoints
  - Frontend: Server Components by default, client components only when needed
  - Commits: Conventional Commits (feat:, fix:, chore:, etc.)
  - Env vars: managed via .env files, never hardcoded

  Domain:
  - Two roles: candidate (job seeker) and recruiter (Britasul HR staff)
  - Recruiters are whitelisted by email in the database
  - Vacancies have multi-choice test questions; candidates are scored on submission
  - All candidate data is hard-deleted when a vacancy is closed (hired)

rules:
  tasks:
    - Break tasks into chunks completable in one session
    - Backend and frontend tasks should be listed separately
