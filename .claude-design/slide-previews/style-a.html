<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style A - Bold Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #121212;
            --bg-gradient: linear-gradient(135deg, #121212 0%, #1e1e1e 50%, #121212 100%);
            --card-bg: #007bff; /* Usando o azul técnico do BritaRH */
            --text-primary: #ffffff;
            --text-on-card: #000000;
            --font-display: 'Archivo Black', sans-serif;
            --font-body: 'Space Grotesk', sans-serif;
            --title-size: clamp(2rem, 8vw, 6rem);
            --slide-padding: clamp(2rem, 5vw, 4rem);
        }

        /* Viewport Base */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-body); }
        .slide { width: 100vw; height: 100vh; display: flex; align-items: center; padding: var(--slide-padding); position: relative; background: var(--bg-gradient); }

        /* Style A Specifics */
        .card {
            background: var(--card-bg);
            padding: clamp(1.5rem, 4vw, 3rem);
            max-width: 80%;
            border-radius: 4px;
            box-shadow: 20px 20px 0px rgba(0, 123, 255, 0.2);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .number {
            position: absolute;
            top: 2rem;
            left: 2rem;
            font-family: var(--font-display);
            font-size: clamp(3rem, 10vw, 8rem);
            opacity: 0.1;
            -webkit-text-stroke: 2px white;
            color: transparent;
        }

        h1 {
            font-family: var(--font-display);
            font-size: var(--title-size);
            line-height: 0.9;
            color: var(--text-on-card);
            text-transform: uppercase;
        }

        p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            margin-top: 1rem;
            color: var(--text-on-card);
            font-weight: 500;
        }

        @keyframes slideIn {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <section class="slide">
        <div class="number">01</div>
        <div class="card">
            <h1>BritaRH<br>Modernização</h1>
            <p>Infraestrutura, Segurança e Testes</p>
        </div>
    </section>
</body>
</html>
