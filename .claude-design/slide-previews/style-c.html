<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style C - Neon Cyber</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050a1a;
            --accent-neon: #00ffcc;
            --accent-magenta: #ff00aa;
            --text-primary: #e0e0f0;
            --font-display: 'Chakra Petch', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --title-size: clamp(2.5rem, 10vw, 6rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; background: var(--bg-deep); font-family: var(--font-display); color: var(--text-primary); }

        .slide {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem;
            position: relative;
            background: radial-gradient(circle at 50% 50%, #102040 0%, #050a1a 100%);
        }

        .grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(var(--bg-deep) 1px, transparent 1px), linear-gradient(90deg, var(--bg-deep) 1px, transparent 1px);
            background-size: 50px 50px;
            background-position: -1px -1px;
            opacity: 0.2;
            border: 1px solid rgba(0, 255, 204, 0.1);
        }

        .content {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .scanline {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 204, 0.3);
            box-shadow: 0 0 10px var(--accent-neon);
            animation: scan 4s linear infinite;
        }

        h1 {
            font-size: var(--title-size);
            text-transform: uppercase;
            letter-spacing: -2px;
            color: var(--text-primary);
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.5);
            line-height: 0.9;
        }

        .glitch {
            position: relative;
        }

        .glitch::before, .glitch::after {
            content: "BRITARH";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }

        .tag {
            font-family: var(--font-mono);
            font-size: 1rem;
            color: var(--accent-neon);
            border: 1px solid var(--accent-neon);
            padding: 0.5rem 1rem;
            display: inline-block;
            margin-bottom: 2rem;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 90% 100%, 0 100%);
        }

        @keyframes scan {
            from { top: 0; }
            to { top: 100%; }
        }
    </style>
</head>
<body>
    <section class="slide">
        <div class="grid-overlay"></div>
        <div class="scanline"></div>
        <div class="content">
            <div class="tag">VER: 2.0.4 - INFRA_CORE</div>
            <h1 class="glitch">BRITARH<br>EVOLUÍDO</h1>
        </div>
    </section>
</body>
</html>
