<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style B - Electric Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-white: #ffffff;
            --accent-blue: #4361ee;
            --text-dark: #0a0a0a;
            --text-light: #ffffff;
            --font-main: 'Manrope', sans-serif;
            --title-size: clamp(2.5rem, 8vw, 5rem);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; overflow: hidden; font-family: var(--font-main); }
        
        .slide {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .panel-top {
            flex: 1;
            background: var(--bg-white);
            display: flex;
            align-items: flex-end;
            padding: clamp(2rem, 5vw, 4rem);
            position: relative;
        }

        .panel-bottom {
            height: clamp(80px, 15vh, 150px);
            background: var(--accent-blue);
            padding: 0 clamp(2rem, 5vw, 4rem);
            display: flex;
            align-items: center;
        }

        .accent-bar {
            position: absolute;
            left: 0;
            bottom: 0;
            width: 150px;
            height: 8px;
            background: var(--accent-blue);
        }

        h1 {
            font-weight: 800;
            font-size: var(--title-size);
            color: var(--text-dark);
            line-height: 1.1;
            max-width: 800px;
            animation: fadeInUp 0.8s ease-out;
        }

        .subtitle {
            font-weight: 500;
            color: var(--text-light);
            font-size: clamp(1rem, 1.5vw, 1.25rem);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        @keyframes fadeInUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <section class="slide">
        <div class="panel-top">
            <div class="accent-bar"></div>
            <h1>A Nova Camada de <br>Qualidade BritaRH</h1>
        </div>
        <div class="panel-bottom">
            <p class="subtitle">Dominando a Infraestrutura Moderna</p>
        </div>
    </section>
</body>
</html>
