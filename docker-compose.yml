services:
  # ─── PostgreSQL ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-britarh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-britarh_secret}
      POSTGRES_DB: ${POSTGRES_DB:-britarh_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-britarh} -d ${POSTGRES_DB:-britarh_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── MinIO (S3-compatible storage) ───────────────────────────────
  storage:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ──────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-britarh}:${POSTGRES_PASSWORD:-britarh_secret}@db:5432/${POSTGRES_DB:-britarh_db}
      MINIO_ENDPOINT_URL: http://storage:9000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app    # bind mount para hot reload
    depends_on:
      db:
        condition: service_healthy


volumes:
  postgres_data:
  minio_data:
